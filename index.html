<!DOCTYPE html>
<html lang="en" x-data="appData()" :class="{ 'dark': darkMode }" :dir="lang === 'ar' ? 'rtl' : 'ltr'" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title x-text="t('page_title')">Vault - Premium Digital Products</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.15/index.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/tajawal@5.0.15/index.min.css">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Tajawal', 'sans-serif'],
                    },
                    colors: {
                        luminous: { DEFAULT: '#0066FF', dark: '#0047B3', light: '#3385FF' },
                        ice: { DEFAULT: '#0EA5E9', dark: '#0284C7', light: '#38BDF8' }
                    },
                    animation: {
                        'marquee': 'marquee 25s linear infinite',
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-glow': 'pulseGlow 2s ease-in-out infinite',
                    },
                    keyframes: {
                        marquee: {
                            '0%': { transform: 'translateX(0%)' },
                            '100%': { transform: 'translateX(-100%)' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        },
                        pulseGlow: {
                            '0%, 100%': { boxShadow: '0 0 20px rgba(0, 102, 255, 0.4)' },
                            '50%': { boxShadow: '0 0 40px rgba(0, 102, 255, 0.8)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }
        body { font-family: 'Inter', 'Tajawal', sans-serif; }
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .dark .glass {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .dark .glass-card {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .marquee-container { overflow: hidden; white-space: nowrap; }
        .marquee-content { display: inline-block; animation: marquee 30s linear infinite; }
        .marquee-content:hover { animation-play-state: paused; }
        .hero-gradient {
            background: radial-gradient(circle at 30% 50%, rgba(0, 102, 255, 0.9) 0%, rgba(2, 132, 199, 0.8) 50%, rgba(14, 165, 233, 0.9) 100%);
        }
        .dark .hero-gradient {
            background: radial-gradient(circle at 30% 50%, rgba(15, 23, 42, 0.95) 0%, rgba(2, 6, 23, 0.98) 50%, rgba(15, 23, 42, 0.95) 100%);
        }
        [dir="rtl"] .marquee-content { animation-direction: reverse; }
    </style>
</head>
<body class="bg-white dark:bg-slate-950 text-slate-800 dark:text-slate-100 transition-colors duration-500 antialiased">

    <!-- Navbar -->
    <nav class="fixed top-0 w-full z-50 glass border-b border-slate-200/50 dark:border-slate-800/50 transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <!-- Logo -->
                <div class="flex items-center gap-2 cursor-pointer" @click="scrollTo('hero')">
                    <div class="w-9 h-9 bg-black rounded-lg flex items-center justify-center shadow-lg">
                        <span class="text-white font-bold text-xl tracking-tighter">V</span>
                    </div>
                    <span class="text-xl font-bold tracking-tight text-slate-900 dark:text-white">Vault</span>
                </div>

                <!-- Desktop Links -->
                <div class="hidden md:flex items-center gap-8">
                    <a href="#products" class="text-sm font-medium text-slate-600 dark:text-slate-300 hover:text-luminous dark:hover:text-ice transition-colors" x-text="t('nav_products')"></a>
                    <a href="#stats" class="text-sm font-medium text-slate-600 dark:text-slate-300 hover:text-luminous dark:hover:text-ice transition-colors" x-text="t('nav_stats')"></a>
                    <a href="#dashboard" class="text-sm font-medium text-slate-600 dark:text-slate-300 hover:text-luminous dark:hover:text-ice transition-colors" x-text="t('nav_dashboard')"></a>
                </div>

                <!-- Right Actions -->
                <div class="flex items-center gap-3">
                    <!-- Language & Currency Dropdown -->
                    <div class="relative" x-data="{ open: false }">
                        <button @click="open = !open" @click.outside="open = false" class="flex items-center gap-1 px-3 py-2 rounded-lg text-sm font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            <span x-text="lang === 'ar' ? 'AR / SAR' : 'EN / USD'"></span>
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </button>
                        <div x-show="open" x-transition class="absolute end-0 mt-2 w-48 rounded-xl shadow-xl glass border border-slate-200 dark:border-slate-700 py-2 z-50">
                            <div class="px-4 py-2 text-xs font-semibold text-slate-500 uppercase" x-text="lang === 'ar' ? 'اللغة' : 'Language'"></div>
                            <a href="#" @click.prevent="lang = 'en'; open = false" class="block px-4 py-2 text-sm text-slate-700 dark:text-slate-200 hover:bg-luminous/10">English</a>
                            <a href="#" @click.prevent="lang = 'ar'; open = false" class="block px-4 py-2 text-sm text-slate-700 dark:text-slate-200 hover:bg-luminous/10">العربية</a>
                            <div class="border-t border-slate-200 dark:border-slate-700 my-1"></div>
                            <div class="px-4 py-2 text-xs font-semibold text-slate-500 uppercase" x-text="lang === 'ar' ? 'العملة' : 'Currency'"></div>
                            <a href="#" @click.prevent="open = false" class="block px-4 py-2 text-sm text-slate-700 dark:text-slate-200 hover:bg-luminous/10">USD ($)</a>
                            <a href="#" @click.prevent="open = false" class="block px-4 py-2 text-sm text-slate-700 dark:text-slate-200 hover:bg-luminous/10">SAR (ر.س)</a>
                        </div>
                    </div>

                    <!-- Dark Mode Toggle -->
                    <button @click="toggleDarkMode()" class="p-2 rounded-lg text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                        <svg x-show="!darkMode" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                        <svg x-show="darkMode" x-cloak class="w-5 h-5 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    </button>

                    <!-- Cart -->
                    <button class="relative p-2 rounded-lg text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                        <span x-show="cartCount > 0" x-transition class="absolute -top-1 -end-1 bg-luminous text-white text-[10px] font-bold w-4 h-4 rounded-full flex items-center justify-center" x-text="cartCount"></span>
                    </button>

                    <!-- Prominent Auth Button -->
                    <button @click="openAuthModal()" class="px-5 py-2.5 rounded-xl bg-luminous text-white text-sm font-bold hover:bg-luminous-dark transition-all shadow-lg shadow-luminous/30 hover:shadow-luminous/50 hover:scale-105 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path></svg>
                        <span x-text="t('nav_login')"></span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section id="hero" class="relative pt-32 pb-20 lg:pt-40 lg:pb-32 overflow-hidden hero-gradient">
        <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNjAiIGhlaWdodD0iNjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGRlZnM+PHBhdHRlcm4gaWQ9ImdyaWQiIHdpZHRoPSI2MCIgaGVpZ2h0PSI2MCIgcGF0dGVyblVuaXRzPSJ1c2VyU3BhY2VPblVzZSI+PHBhdGggZD0iTSA2MCAwIEwgMCAwIDAgNjAiIGZpbGw9Im5vbmUiIHN0cm9rZT0icmdiYSgyNTUsMjU1LDI1NSwwLjA1KSIgc3Ryb2tlLXdpZHRoPSIxIi8+PC9wYXR0ZXJuPjwvZGVmcz48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSJ1cmwoI2dyaWQpIi8+PC9zdmc+')] opacity-30"></div>
        
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
            <div class="grid lg:grid-cols-2 gap-12 items-center">
                <div class="space-y-8">
                    <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-white/10 border border-white/20 text-white/90 text-xs font-medium backdrop-blur-sm">
                        <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
                        <span x-text="t('hero_badge')"></span>
                    </div>
                    <h1 class="text-4xl sm:text-5xl lg:text-6xl font-bold text-white leading-tight tracking-tight">
                        <span x-text="t('hero_title_1')"></span> <span class="text-transparent bg-clip-text bg-gradient-to-r from-white to-ice-light" x-text="t('hero_title_2')"></span>
                    </h1>
                    <p class="text-lg text-white/80 max-w-lg leading-relaxed" x-text="t('hero_desc')"></p>
                    <div class="flex flex-col sm:flex-row gap-4">
                        <button class="px-8 py-4 rounded-xl bg-white text-luminous font-bold text-lg hover:scale-105 transition-all shadow-2xl shadow-black/20 animate-pulse-glow" x-text="t('hero_cta_1')"></button>
                        <button class="px-8 py-4 rounded-xl bg-white/10 text-white font-semibold text-lg border border-white/20 hover:bg-white/20 backdrop-blur-sm transition-all" x-text="t('hero_cta_2')"></button>
                    </div>
                    <div class="flex items-center gap-6 pt-4">
                        <div class="flex -space-x-3 rtl:space-x-reverse">
                            <div class="w-10 h-10 rounded-full bg-slate-200 border-2 border-luminous flex items-center justify-center text-xs font-bold text-slate-600">JD</div>
                            <div class="w-10 h-10 rounded-full bg-slate-300 border-2 border-luminous flex items-center justify-center text-xs font-bold text-slate-600">AK</div>
                            <div class="w-10 h-10 rounded-full bg-slate-400 border-2 border-luminous flex items-center justify-center text-xs font-bold text-white">MR</div>
                        </div>
                        <div class="text-white/90 text-sm">
                            <div class="flex text-yellow-400 mb-1">★★★★★ <span class="text-white/70 ms-1">4.9/5</span></div>
                            <span class="text-white/60" x-text="t('hero_reviews')"></span>
                        </div>
                    </div>
                </div>
                <div class="relative hidden lg:block">
                    <div class="absolute inset-0 bg-luminous/30 rounded-full blur-3xl animate-pulse"></div>
                    <img src="https://image.qwenlm.ai/public_source/3d49649b-5623-4429-95ed-ef8e4e643343/176ab9ee5-d8f2-4085-9e65-8add7b776f9f.png" alt="Digital Products" class="relative rounded-3xl shadow-2xl animate-float border border-white/10">
                </div>
            </div>
        </div>
    </section>

    <!-- Trust Marquee -->
    <section class="py-8 bg-slate-50 dark:bg-slate-900 border-y border-slate-200 dark:border-slate-800">
        <div class="marquee-container">
            <div class="marquee-content flex items-center gap-16 px-8">
                <template x-for="i in 2">
                    <div class="flex items-center gap-16 shrink-0">
                        <div class="flex items-center gap-2 text-slate-400 dark:text-slate-500 opacity-60 grayscale hover:grayscale-0 hover:opacity-100 transition-all cursor-pointer">
                            <svg class="w-8 h-8" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
                            <span class="font-bold text-lg">Apple</span>
                        </div>
                        <div class="flex items-center gap-2 text-slate-400 dark:text-slate-500 opacity-60 grayscale hover:grayscale-0 hover:opacity-100 transition-all cursor-pointer">
                            <svg class="w-8 h-8" viewBox="0 0 24 24" fill="currentColor"><path d="M2.15 2.15v19.7h19.7V2.15H2.15zm17.7 17.7H4.15V4.15h15.7v15.7zM6.5 7.5h3v9h-3v-9zm4.5 0h3v9h-3v-9zm4.5 0h3v9h-3v-9z"/></svg>
                            <span class="font-bold text-lg">Microsoft</span>
                        </div>
                        <div class="flex items-center gap-2 text-slate-400 dark:text-slate-500 opacity-60 grayscale hover:grayscale-0 hover:opacity-100 transition-all cursor-pointer">
                            <svg class="w-8 h-8" viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-5.2 1.74 2.89 2.89 0 012.31-4.64 2.93 2.93 0 01.88.13V9.4a6.84 6.84 0 00-1-.05A6.33 6.33 0 005 20.1a6.34 6.34 0 0010.86-4.43v-7a8.16 8.16 0 004.77 1.52v-3.4a4.85 4.85 0 01-1-.1z"/></svg>
                            <span class="font-bold text-lg">TikTok</span>
                        </div>
                        <div class="flex items-center gap-2 text-slate-400 dark:text-slate-500 opacity-60 grayscale hover:grayscale-0 hover:opacity-100 transition-all cursor-pointer">
                            <svg class="w-8 h-8" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                            <span class="font-bold text-lg">Google</span>
                        </div>
                        <div class="flex items-center gap-2 text-slate-400 dark:text-slate-500 opacity-60 grayscale hover:grayscale-0 hover:opacity-100 transition-all cursor-pointer">
                            <svg class="w-8 h-8" viewBox="0 0 24 24" fill="currentColor"><path d="M13.98 11.08c.02-.21.04-.42.04-.64 0-2.21-1.79-4-4-4s-4 1.79-4 4 1.79 4 4 4c1.03 0 1.97-.39 2.68-1.03l2.13 2.13c-1.26 1.26-2.99 2.04-4.89 2.04-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7c0 .74-.12 1.45-.33 2.12l-2.63-1.62z"/></svg>
                            <span class="font-bold text-lg">Amazon</span>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </section>

    <!-- Platform Statistics -->
    <section id="stats" class="py-20 bg-white dark:bg-slate-950">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center mb-16">
                <h2 class="text-3xl sm:text-4xl font-bold text-slate-900 dark:text-white mb-4" x-text="t('stats_title')"></h2>
                <p class="text-ice-dark dark:text-ice-light text-lg max-w-2xl mx-auto" x-text="t('stats_desc')"></p>
            </div>
            <div class="grid md:grid-cols-3 gap-8">
                <div class="glass-card rounded-2xl p-8 text-center hover:scale-105 transition-transform duration-300 shadow-xl">
                    <div class="text-5xl font-bold text-luminous dark:text-ice-light mb-2" x-text="'$' + stats.budget.toLocaleString(lang === 'ar' ? 'ar-EG' : 'en-US')"></div>
                    <div class="text-slate-600 dark:text-slate-400 font-medium" x-text="t('stats_budget')"></div>
                </div>
                <div class="glass-card rounded-2xl p-8 text-center hover:scale-105 transition-transform duration-300 shadow-xl">
                    <div class="text-5xl font-bold text-luminous dark:text-ice-light mb-2" x-text="stats.users.toLocaleString(lang === 'ar' ? 'ar-EG' : 'en-US') + '+'"></div>
                    <div class="text-slate-600 dark:text-slate-400 font-medium" x-text="t('stats_users')"></div>
                </div>
                <div class="glass-card rounded-2xl p-8 text-center hover:scale-105 transition-transform duration-300 shadow-xl">
                    <div class="text-5xl font-bold text-luminous dark:text-ice-light mb-2" x-text="stats.projects.toLocaleString(lang === 'ar' ? 'ar-EG' : 'en-US') + '+'"></div>
                    <div class="text-slate-600 dark:text-slate-400 font-medium" x-text="t('stats_projects')"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- Product Grid -->
    <section id="products" class="py-20 bg-slate-50 dark:bg-slate-900/50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-end mb-12">
                <div>
                    <h2 class="text-3xl sm:text-4xl font-bold text-slate-900 dark:text-white mb-2" x-text="t('products_title')"></h2>
                    <p class="text-slate-600 dark:text-slate-400" x-text="t('products_desc')"></p>
                </div>
                <button class="hidden sm:block text-luminous dark:text-ice font-semibold hover:underline" x-text="t('products_view_all')"></button>
            </div>
            
            <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-6">
                <template x-for="product in products" :key="product.id">
                    <div class="glass-card rounded-2xl overflow-hidden group hover:shadow-2xl hover:shadow-luminous/10 transition-all duration-300 hover:-translate-y-2">
                        <div class="relative h-48 bg-gradient-to-br from-luminous/20 to-ice/20 dark:from-luminous/10 dark:to-ice/10 flex items-center justify-center overflow-hidden">
                            <div class="absolute inset-0 bg-gradient-to-br from-luminous to-ice opacity-10 group-hover:opacity-20 transition-opacity"></div>
                            <span class="text-6xl font-bold text-luminous/30 dark:text-ice/30 group-hover:scale-110 transition-transform duration-500" x-text="product.icon"></span>
                            <div class="absolute top-3 end-3 px-2 py-1 rounded-lg bg-white/90 dark:bg-slate-800/90 text-xs font-bold text-luminous dark:text-ice shadow-sm" x-text="product.category"></div>
                        </div>
                        <div class="p-5">
                            <h3 class="font-bold text-slate-900 dark:text-white mb-1 truncate" x-text="product.name"></h3>
                            <p class="text-sm text-slate-500 dark:text-slate-400 mb-3 line-clamp-2" x-text="product.desc"></p>
